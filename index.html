<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tane Kuruyemiş (Cloud)</title>
<link rel="icon" href="logo.png">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#2e7d32;color:#fff;padding:15px;text-align:center}
button{padding:8px;border:none;background:#2e7d32;color:#fff;border-radius:6px;cursor:pointer;margin:3px}
input{padding:8px;margin:5px}
.card{background:#fff;padding:10px;margin:10px;border-radius:10px}
.admin{position:fixed;bottom:20px;left:20px;background:#000;color:#fff;padding:10px;border-radius:10px;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>

<header>
<h2>Tane Kuruyemiş (Canlı Sistem)</h2>
</header>

<div class="admin" onclick="login()">Admin</div>
<div id="shop"></div>

<div id="adminPanel" class="hidden">
<h3>Admin Panel</h3>
<input id="email" placeholder="email">
<input id="pass" placeholder="şifre" type="password">
<button onclick="register()">Kayıt</button>
<button onclick="loginEmail()">Giriş</button>

<h4>Ürün Ekle</h4>
<input id="name" placeholder="Ürün adı">
<input id="price" placeholder="Fiyat">
<input id="stock" placeholder="Stok">
<input id="img" placeholder="Resim URL">
<button onclick="addProduct()">Ekle</button>

<h4>Siparişler</h4>
<div id="orders"></div>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCz19no8y3VQroeNWkIGLTENinm781t6Ss",
  authDomain: "taneduragi.firebaseapp.com",
  projectId: "taneduragi",
  storageBucket: "taneduragi.firebasestorage.app",
  messagingSenderId: "356076972743",
  appId: "1:356076972743:web:2bef1eb37bbbd678076ce2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// RENDER PRODUCTS
function render(){
 db.collection('products').onSnapshot(snap=>{
  let html='';
  snap.forEach(doc=>{
   let p=doc.data();
   html+=`<div class='card'>
   <img src='${p.img}' width='100%'>
   <h3>${p.name}</h3>
   <p>${p.price}₺ | Stok: ${p.stock}</p>
   <button onclick="order('${doc.id}','${p.name}',${p.price})">Sipariş</button>
   </div>`
  })
  document.getElementById('shop').innerHTML=html;
 })
}

// ADD PRODUCT
function addProduct(){
 db.collection('products').add({
  name:document.getElementById('name').value,
  price:Number(document.getElementById('price').value),
  stock:Number(document.getElementById('stock').value),
  img:document.getElementById('img').value
 })
}

// ORDER
function order(id,name,price){
 db.collection('orders').add({name,price,date:Date.now()})
}

// SHOW ORDERS
function loadOrders(){
 db.collection('orders').onSnapshot(snap=>{
  let html='';
  snap.forEach(doc=>{
   let o=doc.data();
   html+=`<div class='card'>${o.name} - ${o.price}₺
   <button onclick="delOrder('${doc.id}')">Sil</button></div>`
  })
  document.getElementById('orders').innerHTML=html;
 })
}

function delOrder(id){db.collection('orders').doc(id).delete()}

// AUTH
function register(){
 auth.createUserWithEmailAndPassword(
  document.getElementById('email').value,
  document.getElementById('pass').value)
}

function loginEmail(){
 auth.signInWithEmailAndPassword(
  document.getElementById('email').value,
  document.getElementById('pass').value)
}

function login(){
 document.getElementById('adminPanel').classList.toggle('hidden');
 loadOrders();
}

render();
</script>

</body>
</html>
