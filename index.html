<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
 margin:0;
 background:#f4f4f4;
 font-family:'Inter';
}

h1,h2,h3,b{font-family:'Poppins'}

/* LOADING */
.loader{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}

.skeleton{
 height:150px;
 background:linear-gradient(90deg,#eee,#ddd,#eee);
 animation:load 1.2s infinite;
 border-radius:10px;
}

@keyframes load{
 0%{background-position:-100px}
 100%{background-position:200px}
}

/* HEADER */
header{
 position:sticky;
 top:0;
 z-index:999;
 background:#2e7d32;
 color:#fff;
 padding:15px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

/* CART */
.cartBox{position:relative;cursor:pointer}
.cart{font-size:22px}
.badge{
 position:absolute;
 top:-6px;
 right:-10px;
 background:red;
 color:#fff;
 font-size:11px;
 padding:2px 6px;
 border-radius:50%;
}

/* HERO */
.hero{
 background:url("https://i.imgur.com/8Km9tLL.jpg") center/cover;
 color:#fff;
 padding:40px 20px;
 text-align:center;
}

.hero h1{margin:0}
.hero button{
 margin-top:10px;
 padding:10px 20px;
 border:none;
 background:#fff;
 color:#000;
 border-radius:20px;
}

/* BANNERS */
.banners{
 display:flex;
 gap:10px;
 padding:10px;
}

.banner{
 flex:1;
 background:#fff;
 padding:10px;
 border-radius:10px;
 text-align:center;
 font-size:14px;
}

/* CATEGORIES ICON */
.catIcons{
 display:flex;
 gap:15px;
 padding:10px;
 overflow:auto;
}

.catIcon{
 text-align:center;
}

.circle{
 width:60px;
 height:60px;
 border-radius:50%;
 background:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
 margin:auto;
 font-size:22px;
}

/* SEARCH */
.search{padding:10px}
.search input{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
}

/* PRODUCTS */
.products{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
 gap:12px;
 padding:12px;
}

.card{
 background:#fff;
 padding:10px;
 border-radius:12px;
 position:relative;
 transition:.2s;
}

.card:hover{transform:scale(1.03)}

.card img{
 width:100%;
 height:120px;
 object-fit:cover;
 border-radius:10px;
}

/* ADD BUTTON */
.addBtn{
 position:absolute;
 bottom:10px;
 left:10px;
 right:10px;
 background:#2e7d32;
 color:#fff;
 border:none;
 padding:8px;
 border-radius:8px;
 opacity:0;
 transition:.2s;
}

.card:hover .addBtn{
 opacity:1;
}

/* FOOTER */
footer{
 background:#222;
 color:#fff;
 padding:20px;
 text-align:center;
 margin-top:20px;
}

/* TOAST */
.toast{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 background:#333;
 color:#fff;
 padding:10px 20px;
 border-radius:20px;
 opacity:0;
}

.toast.show{opacity:1}

</style>
</head>

<body>

<header>
<b>Tane Kuruyemiş</b>
<div class="cartBox" onclick="goCart()">
 <div class="cart">🛒</div>
 <div class="badge" id="count">0</div>
</div>
</header>

<div class="hero">
<h1>Taze Kuruyemişler</h1>
<p>En kaliteli ürünler kapında</p>
<button onclick="scrollToProducts()">Alışverişe Başla</button>
</div>

<div class="banners">
<div class="banner">🚚 Ücretsiz Kargo</div>
<div class="banner">💸 500₺ üstü %10 indirim</div>
</div>

<div class="catIcons">
<div class="catIcon"><div class="circle">🥜</div>Kuruyemiş</div>
<div class="catIcon"><div class="circle">🍿</div>Atıştırmalık</div>
<div class="catIcon"><div class="circle">🥤</div>İçecek</div>
</div>

<div class="search">
<input type="text" placeholder="Ara..." oninput="search(this.value)">
</div>

<div id="products" class="products"></div>

<div class="toast" id="toast">Sepete eklendi</div>

<footer>
<p>© Tane Kuruyemiş</p>
<p>WhatsApp | Instagram</p>
</footer>

<script>

const products=[
{id:0,name:"Antep Fıstığı",price:150,img:"https://i.imgur.com/8Km9tLL.jpg"},
{id:1,name:"Badem",price:120,img:"https://i.imgur.com/j6y7s3x.jpg"},
{id:2,name:"Leblebi",price:80,img:"https://i.imgur.com/5jz9F8P.jpg"}
];

function render(list){
 let html="";
 list.forEach(p=>{
  html+=`
  <div class="card">
    <img src="${p.img}">
    <h3>${p.name}</h3>
    <p>${p.price}₺</p>
    <button class="addBtn" onclick="addCart(${p.id})">Sepete ekle</button>
  </div>`;
 });
 products.innerHTML=html;
}

function addCart(id){
 let p=productsData.find(x=>x.id==id);
 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 let e=cart.find(x=>x.id==id);
 if(e){e.qty++}else{cart.push({...p,qty:1})}
 localStorage.setItem("cart",JSON.stringify(cart));
 updateCart();
 toast.classList.add("show");
 setTimeout(()=>toast.classList.remove("show"),1500);
}

function updateCart(){
 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 let t=0;
 cart.forEach(p=>t+=p.qty);
 count.innerText=t;
 count.style.display=t? "block":"none";
}

function search(val){
 let f=productsData.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()));
 render(f);
}

function goCart(){
 window.location="cart.html";
}

function scrollToProducts(){
 window.scrollTo({top:500,behavior:"smooth"});
}

const productsData=products;

render(productsData);
updateCart();

</script>

</body>
</html>
