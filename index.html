<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Rent Pro</title>

<style>
body {font-family:Arial;background:#f4f4f4;padding:20px;}
.box {background:#fff;padding:20px;margin:10px;border-radius:10px;}
img {width:100%;height:150px;object-fit:cover;}
button {padding:10px;margin-top:5px;}
</style>
</head>

<body>

<h1>🚗 Rent Pro</h1>

<div class="box">
<h2>Login</h2>
<input id="user" placeholder="kullanıcı">
<input id="pass" placeholder="şifre">
<button onclick="login()">Giriş</button>
</div>

<div id="adminPanel" class="box" style="display:none;">
<h2>Admin Panel</h2>

<input id="carName" placeholder="Araç adı">
<input id="carPrice" placeholder="Fiyat">
<input id="carImg" placeholder="Resim URL">

<button onclick="addCar()">Araç Ekle</button>
</div>

<div class="box">
<h2>Araçlar</h2>
<div id="cars"></div>
</div>

<script>
let currentUser=null;

// 🔐 LOGIN
async function login(){
  const res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  });

  const data = await res.text();

  if(data==="Hatalı giriş"){
    alert("Yanlış!");
    return;
  }

  currentUser = JSON.parse(data);

  if(currentUser.role==="admin"){
    adminPanel.style.display="block";
  }

  loadCars();
}

// 🚗 ARAÇLARI GETİR
async function loadCars(){
  const res = await fetch("/cars");
  const cars = await res.json();

  carsDiv = document.getElementById("cars");
  carsDiv.innerHTML="";

  cars.forEach(c=>{
    carsDiv.innerHTML+=`
      <div class="box">
        <img src="${c.img}">
        <h3>${c.name}</h3>
        <p>${c.price} TL</p>
        ${currentUser?.role==="admin" ?
          `<button onclick="deleteCar('${c._id}')">Sil</button>` : ""}
      </div>
    `;
  });
}

// ➕ EKLE
async function addCar(){
  await fetch("/add-car",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:carName.value,
      price:carPrice.value,
      img:carImg.value
    })
  });

  loadCars();
}

// ❌ SİL
async function deleteCar(id){
  await fetch("/delete-car",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id})
  });

  loadCars();
}

</script>

</body>
</html>
