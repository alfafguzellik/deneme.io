<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:sans-serif;background:#f4f4f4}
header{background:#2e7d32;color:#fff;padding:15px;display:flex;justify-content:space-between}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px}
.card{background:#fff;padding:10px;border-radius:10px;cursor:pointer}
.card img{width:100%;height:150px;object-fit:cover}
.cart{position:fixed;top:20px;right:20px;background:#000;color:#fff;padding:10px;border-radius:20px;cursor:pointer}
</style>
</head>
<body>

<header>
<b>Tane Kuruyemiş</b>
</header>

<div class="cart" onclick="goCart()">🛒</div>

<div class="products" id="products"></div>

<script>
const products=[
{id:0,name:"Antep Fıstığı",price:150,img:"https://i.imgur.com/8Km9tLL.jpg",desc:"Taze fıstık"},
{id:1,name:"Badem",price:120,img:"https://i.imgur.com/j6y7s3x.jpg",desc:"Doğal badem"}
];

function load(){
 let html="";
 products.forEach(p=>{
  html+=`
  <div class="card" onclick="goProduct(${p.id})">
    <img src="${p.img}">
    <h3>${p.name}</h3>
    <p>${p.price}₺</p>
  </div>`;
 });
 productsDiv.innerHTML=html;
}

function goProduct(id){
 localStorage.setItem("product",id);
 window.location="product.html";
}

function goCart(){
 window.location="cart.html";
}

const productsDiv=document.getElementById("products");
load();
</script>

</body>
</html>
