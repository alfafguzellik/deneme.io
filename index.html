<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tane Kuruyemiş</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <img src="assets/logo.png">
  <h2>Yükleniyor...</h2>
</div>

<!-- HEADER -->
<header>
  <h1>Tane Kuruyemiş</h1>
</header>

<!-- ARAMA + ÜRÜNLER -->
<div class="container">
  <input type="text" id="search" placeholder="Ürün ara...">
  <div id="productList" class="products"></div>
</div>

<!-- SEPET -->
<div id="cart">
  <h2>Sepet</h2>
  <ul id="cartItems"></ul>
  <p>Toplam: <span id="total">0</span>₺</p>
</div>

<!-- QUICK VIEW (POPUP) -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="mName"></h2>
    <img id="mImg">

    <label>Gramaj:</label>
    <select id="gram">
      <option value="1">250g</option>
      <option value="2">500g</option>
      <option value="3">1kg</option>
    </select>

    <label>Tür:</label>
    <select id="type">
      <option>Çiğ</option>
      <option>Kavrulmuş</option>
      <option>Tuzlu</option>
    </select>

    <p>Fiyat: <span id="mPrice"></span>₺</p>

    <button onclick="addToCart()">Sepete Ekle</button>
    <button onclick="closeModal()">Kapat</button>
  </div>
</div>

<!-- JS DOSYALARI -->
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/app.js"></script>

</body>
</html>
