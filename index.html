<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Araç Kiralama Pro</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#222; color:#fff; padding:20px; text-align:center; }

.container { padding:20px; }

.cars {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.car {
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.car img {
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:10px 0;
}

button {
  background:#28a745;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#218838; }

.form, .history {
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

.deleteBtn {
  background:red;
  margin-top:5px;
}
</style>
</head>

<body>

<header>
  <h1>🚗 Araç Kiralama Pro</h1>
</header>

<div class="container">

<h2>Araçlar</h2>

<!-- 🔍 ARAMA -->
<input type="text" placeholder="Araç ara..." onkeyup="searchCar(this.value)">

<!-- 💰 FİLTRE -->
<select onchange="filterCars(this.value)">
  <option value="default">Sırala</option>
  <option value="asc">Ucuz → Pahalı</option>
  <option value="desc">Pahalı → Ucuz</option>
</select>

<div class="cars" id="carList"></div>

<div class="form">
<h2>Kiralama</h2>
<input type="text" id="name" placeholder="Adınız">
<select id="carSelect"></select>
<input type="date" id="startDate">
<input type="date" id="endDate">
<button onclick="rentCar()">Kirala</button>
<p id="result"></p>
</div>

<div class="history">
<h2>Geçmiş</h2>

<!-- 📅 TARİH FİLTRE -->
<input type="date" onchange="filterHistory(this.value)">

<ul id="historyList"></ul>
</div>

</div>

<script>
let cars = [
  {id:1,name:"Renault Clio",price:700,img:"https://source.unsplash.com/400x300/?renault-clio"},
  {id:2,name:"Fiat Egea",price:750,img:"https://source.unsplash.com/400x300/?fiat-egea"},
  {id:3,name:"Hyundai i20",price:720,img:"https://source.unsplash.com/400x300/?hyundai-i20"},
  {id:4,name:"Toyota Corolla",price:900,img:"https://source.unsplash.com/400x300/?toyota-corolla"},
  {id:5,name:"Volkswagen Polo",price:800,img:"https://source.unsplash.com/400x300/?vw-polo"},
  {id:6,name:"Dacia Sandero",price:650,img:"https://source.unsplash.com/400x300/?dacia-sandero"}
];

const carList = document.getElementById("carList");
const carSelect = document.getElementById("carSelect");

// ARAÇ BAS
function renderCars(list){
  carList.innerHTML="";
  carSelect.innerHTML="";

  list.forEach(car=>{
    carList.innerHTML+=`
      <div class="car">
        <img src="${car.img}">
        <h3>${car.name}</h3>
        <p>${car.price} TL / gün</p>
      </div>
    `;

    carSelect.innerHTML+=`
      <option value="${car.id}">${car.name}</option>
    `;
  });
}

// 🔍 ARAMA
function searchCar(text){
  const filtered = cars.filter(c =>
    c.name.toLowerCase().includes(text.toLowerCase())
  );
  renderCars(filtered);
}

// 💰 FİLTRE
function filterCars(type){
  let sorted=[...cars];

  if(type==="asc") sorted.sort((a,b)=>a.price-b.price);
  if(type==="desc") sorted.sort((a,b)=>b.price-a.price);

  renderCars(sorted);
}

// 🚗 KİRALAMA
function rentCar(){
  const name=document.getElementById("name").value;
  const carId=carSelect.value;
  const start=document.getElementById("startDate").value;
  const end=document.getElementById("endDate").value;

  if(!name||!start||!end){
    document.getElementById("result").innerText="Alanları doldur!";
    return;
  }

  const car=cars.find(c=>c.id==carId);
  const days=(new Date(end)-new Date(start))/(1000*60*60*24);

  if(days<=0){
    document.getElementById("result").innerText="Tarih hatalı!";
    return;
  }

  const total=days*car.price;

  let history=JSON.parse(localStorage.getItem("rentals"))||[];

  history.push({
    id:Date.now(),
    name,
    car:car.name,
    start,
    end,
    total
  });

  localStorage.setItem("rentals",JSON.stringify(history));

  document.getElementById("result").innerText=`Toplam: ${total} TL`;

  loadHistory();
}

// 📜 GEÇMİŞ YÜKLE
function loadHistory(filterDate=null){
  const historyList=document.getElementById("historyList");
  historyList.innerHTML="";

  let history=JSON.parse(localStorage.getItem("rentals"))||[];

  if(filterDate){
    history=history.filter(h=>h.start===filterDate);
  }

  history.forEach(item=>{
    historyList.innerHTML+=`
      <li>
        ${item.name} - ${item.car} (${item.start} → ${item.end}) - ${item.total} TL
        <button class="deleteBtn" onclick="deleteRental(${item.id})">Sil</button>
      </li>
    `;
  });
}

// ❌ SİLME
function deleteRental(id){
  let history=JSON.parse(localStorage.getItem("rentals"))||[];
  history=history.filter(h=>h.id!==id);
  localStorage.setItem("rentals",JSON.stringify(history));
  loadHistory();
}

// 📅 TARİH FİLTRE
function filterHistory(date){
  loadHistory(date);
}

// INIT
renderCars(cars);
loadHistory();
</script>

</body>
</html>
