<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#1b5e20;color:#fff;padding:20px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
button{padding:8px;border:none;background:#2e7d32;color:#fff;border-radius:6px;margin-top:5px;cursor:pointer}
.cart{position:fixed;top:20px;right:20px;background:#000;color:#fff;padding:10px;border-radius:10px}
.panel{display:none;padding:20px;background:#fff}
img{border-radius:10px}
</style>

</head>
<body>

<header>
<h2>🌰 Tane Kuruyemiş</h2>
</header>

<div class="cart" onclick="toggleCart()">🛒 Sepet (<span id="count">0</span>)</div>

<div class="products" id="products"></div>

<div id="cartPanel" class="panel">
<h3>Sepet</h3>
<div id="cartItems"></div>
<h4 id="total"></h4>
<button onclick="sendWhatsApp()">WhatsApp Sipariş</button>
</div>

<script>

// 🔥 ÜRÜNLER BURADA (İSTEDİĞİN GİBİ DEĞİŞTİR)
const products = [
 {name:"Antep Fıstığı",price:150,img:"https://i.imgur.com/8Km9tLL.jpg"},
 {name:"Badem",price:120,img:"https://i.imgur.com/j6y7s3x.jpg"},
 {name:"Fındık",price:130,img:"https://i.imgur.com/5Aqgz7o.jpg"},
 {name:"Kaju",price:140,img:"https://i.imgur.com/2nCt3Sb.jpg"},
 {name:"Karışık Kuruyemiş",price:160,img:"https://i.imgur.com/9M6XG3H.jpg"}
];

let cart=[];

// ürünleri bas
function loadProducts(){
 let html="";
 products.forEach(p=>{
  html+=`
  <div class="card">
    <img src="${p.img}" width="100%">
    <h3>${p.name}</h3>
    <p>${p.price}₺</p>
    <button onclick="addToCart('${p.name}',${p.price})">Sepete ekle</button>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}

// sepete ekle
function addToCart(name,price){
 cart.push({name,price});
 document.getElementById("count").innerText=cart.length;
}

// sepet aç/kapat
function toggleCart(){
 let p=document.getElementById("cartPanel");
 p.style.display = p.style.display==="block"?"none":"block";
 renderCart();
}

// sepet çiz
function renderCart(){
 let html="";
 let total=0;
 cart.forEach(i=>{
  total+=i.price;
  html+=`<div>${i.name} - ${i.price}₺</div>`;
 });
 document.getElementById("cartItems").innerHTML=html;
 document.getElementById("total").innerText="Toplam: "+total+"₺";
}

// WhatsApp sipariş
function sendWhatsApp(){
 let text="Sipariş:\\n";
 cart.forEach(i=>{
  text += i.name+" - "+i.price+"₺\\n";
 });
 text += "Toplam: "+cart.reduce((a,b)=>a+b.price,0)+"₺";
 window.open("https://wa.me/905330126971?text="+encodeURIComponent(text));
}

// başlat
loadProducts();

</script>

</body>
</html>
