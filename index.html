<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>

<!-- ✅ Firebase CDN (COMPAT) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>
<body>

<h2>Tane Kuruyemiş</h2>

<button onclick="admin()">Admin Panel</button>

<div id="products"></div>

<div id="panel" style="display:none;">
  <h3>Ürün Ekle</h3>
  <input id="name" placeholder="Ürün adı">
  <input id="price" placeholder="Fiyat">
  <button onclick="addProduct()">Ekle</button>

  <h3>Siparişler</h3>
  <div id="orders"></div>
</div>

<script>

// 🔥 SENİN FIREBASE CONFIG (BURAYA SENİN KOD)
const firebaseConfig = {
  apiKey: "BURAYA_APIKEY",
  authDomain: "taneduragi.firebaseapp.com",
  projectId: "taneduragi"
};

// Firebase başlat
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Ürünleri göster
function loadProducts(){
  db.collection("products").onSnapshot(snapshot=>{
    let html = "";
    snapshot.forEach(doc=>{
      let p = doc.data();
      html += `
      <div>
        ${p.name} - ${p.price}₺
        <button onclick="order('${p.name}',${p.price})">Sipariş</button>
      </div>`;
    });
    document.getElementById("products").innerHTML = html;
  });
}

// Ürün ekle
function addProduct(){
  db.collection("products").add({
    name: document.getElementById("name").value,
    price: Number(document.getElementById("price").value)
  });
}

// Sipariş ver
function order(name, price){
  db.collection("orders").add({
    name,
    price,
    date: Date.now()
  });
}

// Siparişleri göster
function loadOrders(){
  db.collection("orders").onSnapshot(snapshot=>{
    let html = "";
    snapshot.forEach(doc=>{
      let o = doc.data();
      html += `<div>${o.name} - ${o.price}₺</div>`;
    });
    document.getElementById("orders").innerHTML = html;
  });
}

// Admin panel aç
function admin(){
  document.getElementById("panel").style.display = "block";
  loadOrders();
}

// Başlat
loadProducts();

</script>

</body>
</html>
