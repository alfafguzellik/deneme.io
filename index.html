<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f8f8f8}

/* HEADER */
header{
 background:linear-gradient(135deg,#1b5e20,#2e7d32);
 color:#fff;
 padding:20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.logo{display:flex;align-items:center;gap:10px}
.logo img{width:55px;height:55px;border-radius:50%;border:3px solid #fff}
.insta{background:#fff;color:#1b5e20;padding:8px 12px;border-radius:20px;text-decoration:none}

/* FİLTRE ALANI */
.filters{
 padding:15px;
 display:grid;
 grid-template-columns:1fr 1fr 1fr 1fr;
 gap:10px;
}

.filters input, .filters select{
 padding:10px;
 border-radius:10px;
 border:1px solid #ccc;
 width:100%;
}

/* GRID */
.products{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:20px;
 padding:20px;
}

.card{
 background:#fff;
 border-radius:15px;
 overflow:hidden;
 box-shadow:0 10px 25px rgba(0,0,0,0.1);
 position:relative;
}
.card img{width:100%;height:180px;object-fit:cover}
.card-content{padding:15px}

.badge{
 position:absolute;
 top:10px;
 left:10px;
 background:red;
 color:#fff;
 padding:4px 8px;
 border-radius:6px;
}

button{
 width:100%;
 padding:10px;
 border:none;
 border-radius:8px;
 background:#2e7d32;
 color:#fff;
 margin-top:10px;
 cursor:pointer;
}

/* SEPET */
.cart{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#000;
 color:#fff;
 padding:12px 18px;
 border-radius:30px;
 cursor:pointer;
}

.panel{
 position:fixed;
 bottom:0;
 width:100%;
 background:#fff;
 padding:20px;
 display:none;
 border-radius:20px 20px 0 0;
}

</style>
</head>
<body>

<header>
<div class="logo">
<img src="logo.png">
<b>Tane Kuruyemiş</b>
</div>
<a class="insta" href="https://www.instagram.com/taneduragi/" target="_blank">Instagram</a>
</header>

<!-- FİLTRE -->
<div class="filters">
<input type="text" id="search" placeholder="Ürün ara..." onkeyup="filterProducts()">
<select id="category" onchange="filterProducts()">
<option value="">Kategori</option>
<option value="fistik">Fıstık</option>
<option value="badem">Badem</option>
<option value="findik">Fındık</option>
<option value="kaju">Kaju</option>
</select>
<input type="number" id="min" placeholder="Min ₺" onkeyup="filterProducts()">
<input type="number" id="max" placeholder="Max ₺" onkeyup="filterProducts()">
</div>

<div class="products" id="products"></div>

<div class="cart" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>

<div class="panel" id="cartPanel">
<h3>Sepet</h3>
<div id="cartItems"></div>
<h4 id="total"></h4>
<button onclick="sendWhatsApp()">WhatsApp Sipariş</button>
</div>

<script>

const products = [
 {name:"Antep Fıstığı",price:150,cat:"fistik",img:"https://i.imgur.com/8Km9tLL.jpg"},
 {name:"Badem",price:120,cat:"badem",img:"https://i.imgur.com/j6y7s3x.jpg"},
 {name:"Fındık",price:130,cat:"findik",img:"https://i.imgur.com/5Aqgz7o.jpg"},
 {name:"Kaju",price:140,cat:"kaju",img:"https://i.imgur.com/2nCt3Sb.jpg"}
];

let cart=[];

// ÜRÜN YÜKLE
function loadProducts(list=products){
 let html="";
 list.forEach(p=>{
  html+=`
  <div class="card">
    <div class="badge">İndirim</div>
    <img src="${p.img}">
    <div class="card-content">
      <h3>${p.name}</h3>
      <p>${p.price}₺</p>
      <button onclick="addToCart('${p.name}',${p.price})">Sepete ekle</button>
    </div>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}

// 🔥 FİLTRE SİSTEMİ
function filterProducts(){
 let search = document.getElementById("search").value.toLowerCase();
 let cat = document.getElementById("category").value;
 let min = document.getElementById("min").value;
 let max = document.getElementById("max").value;

 let filtered = products.filter(p=>{
  return p.name.toLowerCase().includes(search) &&
         (cat==="" || p.cat===cat) &&
         (min==="" || p.price >= min) &&
         (max==="" || p.price <= max);
 });

 loadProducts(filtered);
}

// 🛒
function addToCart(name,price){
 cart.push({name,price});
 document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
 let p=document.getElementById("cartPanel");
 p.style.display = p.style.display==="block"?"none":"block";
 renderCart();
}

function renderCart(){
 let html="";
 let total=0;
 cart.forEach(i=>{
  total+=i.price;
  html+=`<div>${i.name} - ${i.price}₺</div>`;
 });
 document.getElementById("cartItems").innerHTML=html;
 document.getElementById("total").innerText="Toplam: "+total+"₺";
}

function sendWhatsApp(){
 let text="Sipariş:\\n";
 cart.forEach(i=>{
  text+=i.name+" - "+i.price+"₺\\n";
 });
 text+="Toplam: "+cart.reduce((a,b)=>a+b.price,0)+"₺";
 window.open("https://wa.me/905330126971?text="+encodeURIComponent(text));
}

loadProducts();

</script>

</body>
</html>
