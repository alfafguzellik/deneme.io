<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#1b5e20;color:#fff;padding:20px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
button{padding:8px;border:none;background:#2e7d32;color:#fff;border-radius:6px;margin-top:5px;cursor:pointer}
.cart{position:fixed;top:20px;right:20px;background:#000;color:#fff;padding:10px;border-radius:10px}
.admin{position:fixed;bottom:20px;left:20px;background:#000;color:#fff;padding:10px;border-radius:10px}
.panel{display:none;padding:20px;background:#fff}
input{padding:6px;margin:5px}
</style>

</head>
<body>

<header>
<h2>🌰 Tane Kuruyemiş</h2>
</header>

<div class="cart" onclick="toggleCart()">🛒 Sepet (<span id="count">0</span>)</div>
<button class="admin" onclick="adminLogin()">Admin</button>

<div class="products" id="products"></div>

<div id="cartPanel" class="panel">
<h3>Sepet</h3>
<div id="cartItems"></div>
<h4 id="total"></h4>
<button onclick="checkout()">Firebase Sipariş</button>
<button onclick="sendWhatsApp()">WhatsApp Sipariş</button>
</div>

<div id="adminPanel" class="panel">
<h3>Ürün Ekle</h3>
<input id="name" placeholder="Ürün adı">
<input id="price" placeholder="Fiyat">
<input id="img" placeholder="Resim URL">
<button onclick="addProduct()">Ekle</button>

<h3>Siparişler</h3>
<div id="orders"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCz19no8y3VQroeNWkIGLTENinm781t6Ss",
  authDomain: "taneduragi.firebaseapp.com",
  projectId: "taneduragi"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

// ürünleri çek
const productsRef = collection(db,"products");
onSnapshot(productsRef,(snap)=>{
 let html="";
 snap.forEach(doc=>{
  let p=doc.data();
  html+=`
  <div class="card">
    <img src="${p.img}" width="100%">
    <h3>${p.name}</h3>
    <p>${p.price}₺</p>
    <button onclick="addToCart('${p.name}',${p.price})">Sepete ekle</button>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
});

// sepete ekle
window.addToCart = function(name,price){
 cart.push({name,price});
 document.getElementById("count").innerText=cart.length;
}

// sepet
window.toggleCart = function(){
 let p=document.getElementById("cartPanel");
 p.style.display = p.style.display==="block"?"none":"block";
 renderCart();
}

function renderCart(){
 let html="";
 let total=0;
 cart.forEach(i=>{
  total+=i.price;
  html+=`<div>${i.name} - ${i.price}₺</div>`;
 });
 document.getElementById("cartItems").innerHTML=html;
 document.getElementById("total").innerText="Toplam: "+total+"₺";
}

// sipariş firebase
const ordersRef = collection(db,"orders");

window.checkout = async function(){
 await addDoc(ordersRef,{
  items:cart,
  total:cart.reduce((a,b)=>a+b.price,0)
 });
 alert("Sipariş gönderildi");
 cart=[];
 document.getElementById("count").innerText=0;
 renderCart();
}

// WhatsApp sipariş
window.sendWhatsApp = function(){
 let text="Sipariş:\\n";
 cart.forEach(i=>{
  text += i.name+" - "+i.price+"₺\\n";
 });
 text += "Toplam: "+cart.reduce((a,b)=>a+b.price,0)+"₺";
 window.open("https://wa.me/905330126971?text="+encodeURIComponent(text));
}

// ADMIN ŞİFRE
window.adminLogin = function(){
 let pass = prompt("Admin şifre:");
 if(pass==="1234"){
  document.getElementById("adminPanel").style.display="block";
 }else{
  alert("Yanlış şifre");
 }
}

// ürün ekle
window.addProduct = async function(){
 await addDoc(productsRef,{
  name:document.getElementById("name").value,
  price:Number(document.getElementById("price").value),
  img:document.getElementById("img").value
 });
}

// siparişleri göster
onSnapshot(ordersRef,(snap)=>{
 let html="";
 snap.forEach(doc=>{
  let o=doc.data();
  html+=`<div>🧾 ${o.items.length} ürün - ${o.total}₺</div>`;
 });
 document.getElementById("orders").innerHTML=html;
});

</script>

</body>
</html>
