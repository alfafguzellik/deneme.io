<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alfa Güzellik Merkezi</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
  <h1>ALFA GÜZELLİK</h1>
  <p>Lüks Güzelliğin Adresi</p>

  <div class="buttons">
    <button onclick="scrollToBooking()">Hemen Randevu Al</button>
    <button onclick="showServices()">Hizmetlerimiz</button>
  </div>
</header>

<!-- HİZMETLER -->

<section id="services" class="hidden">
  <h2>Hizmetlerimiz</h2>

  <div class="service-grid">
    <div class="card" onclick="openPage('hair')">Kuaför</div>
    <div class="card" onclick="openPage('wax')">Ağda</div>
    <div class="card" onclick="openPage('beauty')">Güzellik</div>
  </div>
</section>

<!-- RANDEVU -->

<section id="booking">
  <h2>Rezervasyon</h2>

  <input type="text" id="name" placeholder="Adınız">
  <input type="date" id="date">
  <input type="time" id="time">

<button onclick="rezervasyonAl()">Rezervasyon Oluştur</button>

</section>

<script src="script.js"></script>

</body>
</html>
