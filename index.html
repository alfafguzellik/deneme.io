<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#2e7d32;color:#fff;padding:20px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px}
button{padding:8px;border:none;background:#2e7d32;color:#fff;border-radius:6px;margin-top:5px}
input{padding:6px;margin:5px}
.admin{position:fixed;bottom:20px;left:20px;background:#000;color:#fff;padding:10px}
.panel{display:none;padding:20px}
</style>

</head>
<body>

<header>
<h2>🌰 Tane Kuruyemiş</h2>
</header>

<div class="products" id="products"></div>

<button class="admin" onclick="toggleAdmin()">Admin</button>

<div class="panel" id="panel">
<h3>Ürün ekle</h3>
<input id="name" placeholder="Ürün adı">
<input id="price" placeholder="Fiyat">
<input id="img" placeholder="Resim URL">
<button onclick="addProduct()">Ekle</button>

<h3>Siparişler</h3>
<div id="orders"></div>
</div>

<script type="module">

// 🔥 SENİN KODDAN AYIKLADIM
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// ✅ SADECE GEREKEN CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCz19no8y3VQroeNWkIGLTENinm781t6Ss",
  authDomain: "taneduragi.firebaseapp.com",
  projectId: "taneduragi"
};

// başlat
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ürünleri çek
const productsRef = collection(db,"products");

onSnapshot(productsRef,(snap)=>{
 let html="";
 snap.forEach(doc=>{
  let p=doc.data();
  html+=`
  <div class="card">
    <img src="${p.img}" width="100%">
    <h3>${p.name}</h3>
    <p>${p.price}₺</p>
    <button onclick="order('${p.name}',${p.price})">Sipariş</button>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
});

// ürün ekle
window.addProduct = async function(){
 await addDoc(productsRef,{
  name:document.getElementById("name").value,
  price:Number(document.getElementById("price").value),
  img:document.getElementById("img").value
 });
}

// sipariş ver
const ordersRef = collection(db,"orders");

window.order = async function(name,price){
 await addDoc(ordersRef,{name,price});
 alert("Sipariş gönderildi");
}

// siparişleri göster
onSnapshot(ordersRef,(snap)=>{
 let html="";
 snap.forEach(doc=>{
  let o=doc.data();
  html+=`<div>${o.name} - ${o.price}₺</div>`;
 });
 document.getElementById("orders").innerHTML=html;
});

// admin panel
window.toggleAdmin = function(){
 let p=document.getElementById("panel");
 p.style.display = p.style.display==="block"?"none":"block";
}

</script>

</body>
</html>
