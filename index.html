<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tane Kuruyemiş PRO</title>
<link rel="icon" href="logo.png">
<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#2e7d32;color:#fff;padding:15px;text-align:center}
button{padding:8px;border:none;background:#2e7d32;color:#fff;border-radius:6px;cursor:pointer;margin:3px}
input{padding:8px;margin:5px}
.card{background:#fff;padding:10px;margin:10px;border-radius:10px}
.admin{position:fixed;bottom:20px;left:20px;background:#000;color:#fff;padding:10px;border-radius:10px;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>

<header>
<h2>Tane Kuruyemiş PRO Sistem</h2>
</header>

<div class="admin" onclick="login()">Admin</div>

<div id="shop"></div>

<div id="adminPanel" class="hidden">
<h3>Admin Panel</h3>

<h4>Ürün Ekle</h4>
<input id="name" placeholder="Ürün adı">
<input id="price" placeholder="Fiyat">
<input id="stock" placeholder="Stok">
<input type="file" id="img">
<button onclick="addProduct()">Ekle</button>

<h4>Siparişler</h4>
<div id="orders"></div>
</div>

<script>

// LOCAL DATABASE (kalıcı)
let products = JSON.parse(localStorage.getItem('products')) || [];
let orders = JSON.parse(localStorage.getItem('orders')) || [];
let cart = [];

function save(){
localStorage.setItem('products',JSON.stringify(products));
localStorage.setItem('orders',JSON.stringify(orders));
}

function render(){
let html='';
products.forEach((p,i)=>{
html+=`<div class='card'>
<img src='${p.img}' width='100%'>
<h3>${p.name}</h3>
<p>${p.price}₺ | Stok: ${p.stock}</p>
<button onclick="addToCart(${i})">Sepete ekle</button>
</div>`});
document.getElementById('shop').innerHTML=html;
}

function addProduct(){
let file=document.getElementById('img').files[0];
let reader=new FileReader();
reader.onload=function(){
products.push({
name:document.getElementById('name').value,
price:parseInt(document.getElementById('price').value),
stock:parseInt(document.getElementById('stock').value),
img:reader.result
});
save();render();
}
if(file) reader.readAsDataURL(file);
}

function addToCart(i){
let p=products[i];
if(p.stock<=0){alert('Stok yok');return}
p.stock--;
cart.push(p);
save();render();
}

function checkout(){
orders.push(cart);
save();
cart=[];
alert('Sipariş alındı');
renderOrders();
}

function renderOrders(){
let html='';
orders.forEach((o,index)=>{
html+=`<div class='card'>Sipariş ${index+1}<br>`;
o.forEach(i=>html+=i.name+'<br>');
html+=`
<button onclick='approve(${index})'>Onayla</button>
<button onclick='deleteOrder(${index})'>Sil</button>
</div>`});
document.getElementById('orders').innerHTML=html;
}

function approve(i){alert('Sipariş onaylandı');}
function deleteOrder(i){orders.splice(i,1);save();renderOrders();}

function login(){
let u=prompt('kullanıcı');
let p=prompt('şifre');
if(u==='admin' && p==='1234'){
document.getElementById('adminPanel').classList.toggle('hidden');
renderOrders();
}else alert('hatalı');
}

render();
</script>

</body>
</html>
