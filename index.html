<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tane Kuruyemiş</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f4f6f5}

/* HEADER */
header{
 background:linear-gradient(135deg,#1b5e20,#2e7d32);
 padding:15px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 color:#fff;
}

.logo{display:flex;align-items:center;gap:10px}
.logo img{width:50px;height:50px;border-radius:50%;border:2px solid #fff}

/* INSTAGRAM (SAĞ ALT) */
.insta{
 position:fixed;
 bottom:20px;
 left:20px;
 background:#E1306C;
 color:#fff;
 padding:12px 16px;
 border-radius:30px;
 text-decoration:none;
 font-size:14px;
 z-index:999;
 box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* SEPET (SAĞ ÜST) */
.cart{
 position:fixed;
 top:20px;
 right:20px;
 background:#000;
 color:#fff;
 padding:12px 18px;
 border-radius:30px;
 cursor:pointer;
 z-index:999;
}

/* FILTERS */
.filters{
 padding:15px;
}

/* SLIDER */
.range{
 display:flex;
 flex-direction:column;
 gap:5px;
}

.range input{width:100%}

/* GRID */
.products{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:20px;
 padding:20px;
}

.card{
 background:#fff;
 border-radius:15px;
 overflow:hidden;
 box-shadow:0 10px 25px rgba(0,0,0,0.1);
 position:relative;
}
.card img{width:100%;height:170px;object-fit:cover}
.card-content{padding:15px}
.price{color:#2e7d32;font-weight:bold}

.badge{
 position:absolute;
 top:10px;
 left:10px;
 background:red;
 color:#fff;
 padding:3px 7px;
 font-size:12px;
 border-radius:6px;
}

button{
 width:100%;
 padding:10px;
 border:none;
 border-radius:8px;
 background:#2e7d32;
 color:#fff;
 margin-top:8px;
 cursor:pointer;
}

/* CART PANEL */
.panel{
 position:fixed;
 bottom:0;
 width:100%;
 background:#fff;
 padding:20px;
 display:none;
 border-radius:20px 20px 0 0;
}

</style>
</head>
<body>

<header>
<div class="logo">
<img src="logo.png">
<b>Tane Kuruyemiş</b>
</div>
</header>

<a class="insta" href="https://www.instagram.com/taneduragi/" target="_blank">Instagram</a>

<div class="cart" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>

<!-- FILTER -->
<div class="filters">
<input id="search" placeholder="Ürün ara..." onkeyup="filterProducts()">

<div class="range">
<label>Fiyat: <span id="minVal">0</span>₺ - <span id="maxVal">200</span>₺</label>
<input type="range" id="minRange" min="0" max="200" value="0" oninput="filterProducts()">
<input type="range" id="maxRange" min="0" max="200" value="200" oninput="filterProducts()">
</div>

</div>

<div class="products" id="products"></div>

<div class="panel" id="cartPanel">
<h3>Sepet</h3>
<div id="cartItems"></div>
<h4 id="total"></h4>
<button onclick="sendWhatsApp()">WhatsApp Sipariş</button>
</div>

<script>

const products = [
 {name:"Antep Fıstığı",price:150,img:"https://i.imgur.com/8Km9tLL.jpg"},
 {name:"Badem",price:120,img:"https://i.imgur.com/j6y7s3x.jpg"},
 {name:"Fındık",price:130,img:"https://i.imgur.com/5Aqgz7o.jpg"},
 {name:"Kaju",price:140,img:"https://i.imgur.com/2nCt3Sb.jpg"}
];

let cart=[];

// LOAD
function loadProducts(list=products){
 let html="";
 list.forEach(p=>{
  html+=`
  <div class="card">
    <div class="badge">İndirim</div>
    <img src="${p.img}">
    <div class="card-content">
      <h3>${p.name}</h3>
      <div class="price">${p.price}₺</div>
      <button onclick="addToCart('${p.name}',${p.price})">Sepete ekle</button>
    </div>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}

// FILTER
function filterProducts(){
 let s=search.value.toLowerCase();
 let minv=parseInt(minRange.value);
 let maxv=parseInt(maxRange.value);

 document.getElementById("minVal").innerText=minv;
 document.getElementById("maxVal").innerText=maxv;

 let filtered = products.filter(p=>{
  return p.name.toLowerCase().includes(s) &&
         p.price>=minv && p.price<=maxv;
 });

 loadProducts(filtered);
}

// CART
function addToCart(name,price){
 cart.push({name,price});
 count.innerText=cart.length;
}

function toggleCart(){
 cartPanel.style.display = cartPanel.style.display==="block"?"none":"block";
 renderCart();
}

function renderCart(){
 let html="";
 let total=0;
 cart.forEach(i=>{
  total+=i.price;
  html+=`<div>${i.name} - ${i.price}₺</div>`;
 });
 cartItems.innerHTML=html;
 document.getElementById("total").innerText="Toplam: "+total+"₺";
}

function sendWhatsApp(){
 let text="Sipariş:%0A";
 cart.forEach(i=>{
  text+=`${i.name} - ${i.price}₺%0A`;
 });
 text+="Toplam: "+cart.reduce((a,b)=>a+b.price,0)+"₺";
 window.open("https://wa.me/905330126971?text="+text);
}

loadProducts();

</script>

</body>
</html>
