<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tane Kuruyemiş</title>
<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#fffaf5;color:#333}
header{background:linear-gradient(90deg,#2e7d32,#8bc34a);color:#fff;padding:15px;text-align:center}
header img{height:70px}
nav a{color:#fff;margin:0 15px;text-decoration:none;font-weight:600}
.hero{padding:60px 20px;text-align:center;background:linear-gradient(to right,#dcedc8,#fff)}
.hero h1{font-size:42px;color:#2e7d32}
.section{padding:60px 20px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;max-width:1100px;margin:auto}
.card{background:#fff;padding:15px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.08);transition:.3s}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;border-radius:15px;height:150px;object-fit:cover}
button{background:#2e7d32;color:#fff;border:none;padding:10px;border-radius:10px;cursor:pointer;margin-top:10px;width:100%}
.cart-btn{position:fixed;top:20px;right:20px;background:#fff;padding:12px 18px;border-radius:30px;box-shadow:0 5px 15px rgba(0,0,0,.2);cursor:pointer}
.cart-panel{position:fixed;top:0;right:-400px;width:350px;height:100%;background:#fff;box-shadow:-5px 0 15px rgba(0,0,0,.2);padding:20px;transition:.3s;z-index:2000}
.cart-panel.active{right:0}
.cart-item{display:flex;justify-content:space-between;margin:10px 0}
input{padding:10px;margin:8px;width:90%;border-radius:8px;border:1px solid #ddd}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px 20px;border-radius:50px;text-decoration:none}
</style>
</head>
<body>

<header>
<img src="logo.png" alt="Tane Kuruyemiş Logo">
<nav>
<a href="#urunler">Ürünler</a>
<a href="#odeme">Ödeme</a>
</nav>
</header>

<div class="cart-btn" onclick="toggleCart()">🛒 Sepet</div>

<div class="cart-panel" id="cartPanel">
<h3>Sepet</h3>
<div id="cartItems"></div>
<p><b>Toplam: <span id="total">0</span>₺</b></p>
<hr>
<h4>Ödeme</h4>
<input placeholder="Ad Soyad">
<input placeholder="Adres">
<input placeholder="Telefon">
<button onclick="checkout()">Siparişi Tamamla</button>
</div>

<section class="hero">
<h1>Tane Kuruyemiş</h1>
<p>Doğal, Taze ve Güvenilir</p>
</section>

<section id="urunler" class="section">
<h2>Ürünler</h2>
<div class="products">
<div class="card"><img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"><h3>Kaju</h3><p>150₺</p><button onclick="addToCart('Kaju',150)">Sepete Ekle</button></div>
<div class="card"><img src="https://images.unsplash.com/photo-1589308078054-832b5d0c66cb"><h3>Badem</h3><p>120₺</p><button onclick="addToCart('Badem',120)">Sepete Ekle</button></div>
<div class="card"><img src="https://images.unsplash.com/photo-1615484477778-ca3b77940c25"><h3>Fındık</h3><p>100₺</p><button onclick="addToCart('Fındık',100)">Sepete Ekle</button></div>
<div class="card"><img src="https://images.unsplash.com/photo-1590080877777-6b47e7f5e2ad"><h3>Antep Fıstığı</h3><p>180₺</p><button onclick="addToCart('Fıstık',180)">Sepete Ekle</button></div>
</div>
</section>

<a class="whatsapp" href="https://wa.me/905330126971">WhatsApp</a>

<script>
let cart=[];
function addToCart(name,price){cart.push({name,price});renderCart();}
function renderCart(){let html='';let total=0;cart.forEach((i,index)=>{total+=i.price;html+=`<div class='cart-item'>${i.name} ${i.price}₺ <button onclick='removeItem(${index})'>X</button></div>`});document.getElementById('cartItems').innerHTML=html;document.getElementById('total').innerText=total}
function removeItem(i){cart.splice(i,1);renderCart();}
function toggleCart(){document.getElementById('cartPanel').classList.toggle('active')}
function checkout(){if(cart.length==0){alert('Sepet boş');return;}window.open(`https://wa.me/905330126971?text=Sipariş:%20${JSON.stringify(cart)}`,'_blank');}
</script>

</body>
</html>
