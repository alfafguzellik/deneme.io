<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<section>

</div>

<section>
<h2>Online Rezervasyon</h2>

<select id="service">
<option>İpek Kirpik</option>
<option>Ağda</option>
<option>Tırnak</option>
<option>Gelin Saçı</option>

<option>Makyaj</option>

<input type="date" id="date">
<input type="time" id="time">

<button onclick="rezervasyonAl()">Rezervasyon Oluştur</button> <button onclick="whatsappGonder()">WhatsApp ile Rezervasyon</button>

</div>

</section>

<footer>
<p>Telefon: +905000000000</p>
<p>Instagram: @alfaguzellik</p>
</footer>

<script src="script.js"></script>

</body>
</html>
