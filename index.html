<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
 font-family:'Poppins',sans-serif;
 background:#f4f4f4;
 margin:0;
}

header{
 background:#2e7d32;
 color:#fff;
 padding:15px;
 font-size:18px;
}

.products{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
 gap:12px;
 padding:12px;
}

.card{
 background:#fff;
 padding:10px;
 border-radius:12px;
 cursor:pointer;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
 transition:.2s;
}

.card:hover{
 transform:scale(1.03);
}

.card img{
 width:100%;
 height:120px;
 object-fit:cover;
 border-radius:10px;
 display:block;
}

.card h3{
 font-size:15px;
 margin:5px 0;
}

.cart{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#2e7d32;
 color:#fff;
 padding:14px;
 border-radius:50%;
 font-size:18px;
 cursor:pointer;
}

.badge{
 position:absolute;
 top:-5px;
 right:-5px;
 background:red;
 color:#fff;
 font-size:12px;
 padding:3px 6px;
 border-radius:50%;
}

.cartBox{
 position:fixed;
 bottom:20px;
 right:20px;
}

</style>
</head>
<body>

<header>
<b>Tane Kuruyemiş</b>
</header>

<div class="cartBox" onclick="goCart()">
 <div class="cart">🛒</div>
 <div class="badge" id="count">0</div>
</div>

<div class="products" id="products"></div>

<script>

const products=[
{id:0,name:"Antep Fıstığı",price:150,img:"https://i.imgur.com/8Km9tLL.jpg",desc:"Taze fıstık"},
{id:1,name:"Badem",price:120,img:"https://i.imgur.com/j6y7s3x.jpg",desc:"Doğal badem"}
];

function load(){
 let html="";
 products.forEach(p=>{
  html+=`
  <div class="card" onclick="goProduct(${p.id})">
    <img src="${p.img}">
    <h3>${p.name}</h3>
    <p>${p.price}₺</p>
  </div>`;
 });
 productsDiv.innerHTML=html;
}

function updateCartCount(){
 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 let total=0;

 cart.forEach(p=>{
  total += p.qty || 1;
 });

 document.getElementById("count").innerText=total;
}

function goProduct(id){
 localStorage.setItem("product",id);
 window.location="product.html";
}

function goCart(){
 window.location="cart.html";
}

const productsDiv=document.getElementById("products");

load();
updateCartCount();

</script>

</body>
</html>
