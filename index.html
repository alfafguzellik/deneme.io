<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>

/* DARK MODE */
:root{
 --bg:#f4f4f4;
 --card:#fff;
 --text:#000;
 --main:#2e7d32;
}

.dark{
 --bg:#121212;
 --card:#1e1e1e;
 --text:#fff;
}

/* BASE */
body{
 margin:0;
 background:var(--bg);
 color:var(--text);
 font-family:'Inter';
 transition:.3s;
}

h1,h2,h3,b{font-family:'Poppins'}

/* HEADER */
header{
 background:var(--main);
 color:#fff;
 padding:15px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.topRight{
 display:flex;
 gap:15px;
 align-items:center;
}

/* DARK BTN */
.darkBtn{
 cursor:pointer;
 font-size:18px;
}

/* CART */
.cartBox{
 position:relative;
 cursor:pointer;
}

.cart{
 font-size:22px;
 transition:.3s;
}

.cart.animate{
 animation:bounce .5s;
}

@keyframes bounce{
 50%{transform:scale(1.3)}
}

.badge{
 position:absolute;
 top:-6px;
 right:-10px;
 background:red;
 color:#fff;
 font-size:11px;
 padding:2px 6px;
 border-radius:50%;
}

/* SEARCH */
.search{padding:10px}
.search input{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 outline:none;
}

/* CATEGORY */
.categories{
 display:flex;
 gap:10px;
 padding:10px;
 overflow:auto;
}

.cat{
 background:var(--card);
 padding:8px 14px;
 border-radius:20px;
 cursor:pointer;
}

.active{
 background:var(--main);
 color:#fff;
}

/* PRODUCTS */
.products{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
 gap:12px;
 padding:12px;
}

.card{
 background:var(--card);
 padding:10px;
 border-radius:12px;
 cursor:pointer;
 box-shadow:0 3px 8px rgba(0,0,0,0.08);
 transition:.25s;
 position:relative;
}

.card:hover{
 transform:translateY(-5px) scale(1.02);
}

.card img{
 width:100%;
 height:120px;
 object-fit:cover;
 border-radius:10px;
}

/* ADD BUTTON */
.addBtn{
 margin-top:5px;
 background:var(--main);
 color:#fff;
 border:none;
 padding:6px;
 border-radius:6px;
 width:100%;
}

/* TOAST */
.toast{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 background:#333;
 color:#fff;
 padding:12px 20px;
 border-radius:20px;
 opacity:0;
}

.toast.show{
 opacity:1;
 bottom:40px;
 transition:.3s;
}

</style>
</head>

<body>

<header>
<b>Tane Kuruyemiş</b>

<div class="topRight">

<div class="darkBtn" onclick="toggleDark()">🌙</div>

<div class="cartBox" onclick="goCart()">
 <div class="cart" id="cartIcon">🛒</div>
 <div class="badge" id="count">0</div>
</div>

</div>

</header>

<div class="search">
<input type="text" placeholder="Ara..." oninput="search(this.value)">
</div>

<div class="categories" id="cats"></div>
<div class="products" id="products"></div>

<div class="toast" id="toast">Sepete eklendi</div>

<script>

const products=[
{id:0,name:"Antep Fıstığı",price:150,cat:"Kuruyemiş",img:"https://i.imgur.com/8Km9tLL.jpg"},
{id:1,name:"Badem",price:120,cat:"Kuruyemiş",img:"https://i.imgur.com/j6y7s3x.jpg"},
{id:2,name:"Leblebi",price:80,cat:"Atıştırmalık",img:"https://i.imgur.com/5jz9F8P.jpg"}
];

let currentCat="Tümü";

/* DARK MODE */
if(localStorage.getItem("dark")==="1"){
 document.body.classList.add("dark");
}

function toggleDark(){
 document.body.classList.toggle("dark");
 localStorage.setItem("dark",document.body.classList.contains("dark")?"1":"0");
}

/* CATEGORY */
function loadCats(){
 let cats=["Tümü",...new Set(products.map(p=>p.cat))];
 let html="";
 cats.forEach(c=>{
  html+=`<div class="cat ${c==currentCat?'active':''}" onclick="setCat('${c}')">${c}</div>`;
 });
 catsDiv.innerHTML=html;
}

function setCat(c){
 currentCat=c;
 filter();
}

/* SEARCH */
function search(val){
 filter(val);
}

function filter(val=""){
 let filtered=products.filter(p=>{
  return (currentCat=="Tümü"||p.cat==currentCat) &&
         p.name.toLowerCase().includes(val.toLowerCase());
 });
 render(filtered);
 loadCats();
}

/* RENDER */
function render(list){
 let html="";
 list.forEach(p=>{
  html+=`
  <div class="card">
    <img src="${p.img}">
    <h3>${p.name}</h3>
    <p>${p.price}₺</p>
    <button class="addBtn" onclick="addCart(event,${p.id})">Sepete ekle</button>
  </div>`;
 });
 productsDiv.innerHTML=html;
}

/* ADD TO CART + UÇAN ANİMASYON */
function addCart(e,id){

 e.stopPropagation();

 let p=products.find(x=>x.id==id);

 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 let ex=cart.find(x=>x.id==id);

 if(ex){ex.qty++}else{cart.push({...p,qty:1})}

 localStorage.setItem("cart",JSON.stringify(cart));

 fly(e.target);
 updateCartCount();
 animateCart();
 showToast();
}

/* UÇAN ANİMASYON */
function fly(btn){
 let img=btn.parentElement.querySelector("img").cloneNode();
 let rect=btn.getBoundingClientRect();
 let cart=document.getElementById("cartIcon").getBoundingClientRect();

 img.style.position="fixed";
 img.style.left=rect.left+"px";
 img.style.top=rect.top+"px";
 img.style.width="50px";
 img.style.zIndex=999;

 document.body.appendChild(img);

 img.animate([
  {transform:"translate(0,0) scale(1)"},
  {transform:`translate(${cart.left-rect.left}px,${cart.top-rect.top}px) scale(0.2)`}
 ],{duration:600});

 setTimeout(()=>img.remove(),600);
}

/* CART */
function updateCartCount(){
 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 let total=0;
 cart.forEach(p=>total+=p.qty||1);
 count.innerText=total;
}

function animateCart(){
 cartIcon.classList.add("animate");
 setTimeout(()=>cartIcon.classList.remove("animate"),500);
}

/* TOAST */
function showToast(){
 toast.classList.add("show");
 setTimeout(()=>toast.classList.remove("show"),1500);
}

function goCart(){
 window.location="cart.html";
}

/* INIT */
const productsDiv=document.getElementById("products");
const catsDiv=document.getElementById("cats");

loadCats();
render(products);
updateCartCount();

</script>

</body>
</html>
