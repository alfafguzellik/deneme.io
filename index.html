<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Tane Kuruyemiş</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 background:#f4f4f4;
 font-family:'Inter',sans-serif;
 -webkit-font-smoothing:antialiased;
}

h1,h2,h3,b{
 font-family:'Poppins',sans-serif;
}

header{
 background:#2e7d32;
 color:#fff;
 padding:15px;
 font-size:18px;
}

.search{padding:10px}
.search input{
 width:100%;
 padding:10px;
 border:none;
 border-radius:8px;
 outline:none;
}

.categories{
 display:flex;
 gap:10px;
 padding:10px;
 overflow:auto;
}

.cat{
 background:#fff;
 padding:8px 12px;
 border-radius:20px;
 cursor:pointer;
 white-space:nowrap;
}

.active{
 background:#2e7d32;
 color:#fff;
}

.products{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
 gap:12px;
 padding:12px;
}

.card{
 background:#fff;
 padding:10px;
 border-radius:12px;
 cursor:pointer;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
 width:100%;
 height:120px;
 object-fit:cover;
 border-radius:10px;
 display:block;
}

.cartBox{
 position:fixed;
 bottom:20px;
 right:20px;
}

.cart{
 background:#2e7d32;
 color:#fff;
 padding:14px;
 border-radius:50%;
}

.badge{
 position:absolute;
 top:-5px;
 right:-5px;
 background:red;
 color:#fff;
 font-size:12px;
 padding:3px 6px;
 border-radius:50%;
}
</style>
</head>

<body>

<header><b>Tane Kuruyemiş</b></header>

<div class="search">
<input type="text" placeholder="Ara..." oninput="search(this.value)">
</div>

<div class="categories" id="cats"></div>
<div class="products" id="products"></div>

<div class="cartBox" onclick="goCart()">
 <div class="cart">🛒</div>
 <div class="badge" id="count">0</div>
</div>

<script>

const products=[
{id:0,name:"Antep Fıstığı",price:150,cat:"Kuruyemiş",img:"https://i.imgur.com/8Km9tLL.jpg",desc:"Taze fıstık"},
{id:1,name:"Badem",price:120,cat:"Kuruyemiş",img:"https://i.imgur.com/j6y7s3x.jpg",desc:"Doğal badem"},
{id:2,name:"Leblebi",price:80,cat:"Atıştırmalık",img:"https://i.imgur.com/5jz9F8P.jpg",desc:"Sarı leblebi"}
];

let currentCat="Tümü";

function loadCats(){
 let cats=["Tümü",...new Set(products.map(p=>p.cat))];
 let html="";
 cats.forEach(c=>{
  html+=`<div class="cat ${c==currentCat?'active':''}" onclick="setCat('${c}')">${c}</div>`;
 });
 document.getElementById("cats").innerHTML=html;
}

function setCat(c){
 currentCat=c;
 filter();
}

function search(val){
 filter(val);
}

function filter(val=""){
 let filtered=products.filter(p=>{
  return (currentCat=="Tümü"||p.cat==currentCat) &&
         p.name.toLowerCase().includes(val.toLowerCase());
 });
 render(filtered);
 loadCats();
}

function render(list){
 let html="";
 list.forEach(p=>{
  html+=`
  <div class="card" onclick="goProduct(${p.id})">
    <img src="${p.img}">
    <h3>${p.name}</h3>
    <p>${p.price}₺</p>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}

function updateCartCount(){
 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 let total=0;
 cart.forEach(p=> total+=p.qty||1);
 document.getElementById("count").innerText=total;
}

function goProduct(id){
 localStorage.setItem("product",id);
 window.location="product.html";
}

function goCart(){
 window.location="cart.html";
}

loadCats();
render(products);
updateCartCount();

</script>

</body>
</html>
