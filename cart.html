<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sepet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;padding:15px;background:#f4f4f4;font-family:'Inter'}
h2{font-family:'Poppins'}
.item{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
.row{display:flex;justify-content:space-between}
.qty{display:flex;gap:10px;margin-top:5px}
button{padding:10px;background:#2e7d32;color:#fff;border:none;width:100%;margin-top:10px;border-radius:8px}
.small{width:30px;height:30px}
.remove{background:red;color:#fff;padding:5px;border-radius:5px}
</style>
</head>

<body>

<h2>Sepet</h2>

<div id="list"></div>
<h3 id="total"></h3>

<button onclick="order()">WhatsApp Sipariş</button>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function render(){
 let html="",t=0;

 cart.forEach((p,i)=>{
  t+=p.price*p.qty;

  html+=`
  <div class="item">
   <div class="row">
    <b>${p.name}</b>
    <span class="remove" onclick="delItem(${i})">Sil</span>
   </div>

   <div>${p.price}₺</div>

   <div class="qty">
    <button class="small" onclick="dec(${i})">-</button>
    <b>${p.qty}</b>
    <button class="small" onclick="inc(${i})">+</button>
   </div>

   <div>${p.price*p.qty}₺</div>
  </div>`;
 });

 document.getElementById("list").innerHTML=html;
 document.getElementById("total").innerText="Toplam: "+t+"₺";
}

function inc(i){cart[i].qty++;save()}
function dec(i){cart[i].qty>1?cart[i].qty--:cart.splice(i,1);save()}
function delItem(i){cart.splice(i,1);save()}

function save(){
 localStorage.setItem("cart",JSON.stringify(cart));
 render();
}

function order(){
 let t=0,text="Sipariş:%0A";
 cart.forEach(p=>{
  t+=p.price*p.qty;
  text+=`${p.name} x${p.qty} - ${p.price*p.qty}₺%0A`;
 });
 text+="Toplam: "+t+"₺";
 window.open("https://wa.me/905330126971?text="+text);
}

render();

</script>

</body>
</html>
