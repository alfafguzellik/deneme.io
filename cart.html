<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sepet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:sans-serif;padding:20px}
button{padding:10px;background:green;color:#fff;border:none;margin-top:10px;width:100%}
</style>
</head>
<body>

<h2>Sepet</h2>

<div id="list"></div>
<h3 id="total"></h3>

<button onclick="order()">WhatsApp Sipariş</button>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let html="";
let total=0;

cart.forEach(p=>{
 total+=p.price;
 html+=`<div>${p.name} - ${p.price}₺</div>`;
});

list.innerHTML=html;
totalEl.innerText="Toplam: "+total+"₺";

function order(){
 let text="Sipariş:%0A";
 cart.forEach(p=>{
  text+=p.name+" - "+p.price+"₺%0A";
 });
 text+="Toplam: "+total+"₺";
 window.open("https://wa.me/905330126971?text="+text);
}

const totalEl=document.getElementById("total");

</script>

</body>
</html>
